<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>종자 신청 폼</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>종자 신청 폼</h1>
        <p>아래 정보를 입력하여 종자를 신청하세요.</p>
    </header>

    <main>
        <section class="form-section">
            <form id="applicationForm" method="post">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="address">주소</label>
                    <textarea id="address" name="address" rows="3" required></textarea>
                </div>

                <div class="form-group">
                    <label for="phone">연락처</label>
                    <input type="tel" id="phone" name="phone" required>
                </div>

                <div class="form-group">
                    <label for="crop">신청 작물</label>
                    <select id="crop" name="crop" required>
                        <option value="">선택하세요</option>
                        <option value="벼">벼</option>
                        <option value="밀">밀</option>
                        <option value="콩">콩</option>
                        <option value="옥수수">옥수수</option>
                        <option value="감자">감자</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="quantity">수량 (kg)</label>
                    <input type="number" id="quantity" name="quantity" min="1" required>
                </div>

                <button type="submit" class="btn">신청 제출</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 농업 종자 센터. 모든 권리 보유.</p>
    </footer>

    <script>
        document.getElementById('applicationForm').addEventListener('submit', function(event) {
            event.preventDefault();

            const formData = new FormData(this);

            fetch('https://script.google.com/macros/s/AKfycbwBf0Y3hL13sjjjyDd55EsdAwJNNsT8sQC-Mvkbkj_5nSC1olMHFoYi9wd3s21iB6bh/exec', {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            })
            .then(() => {
                alert('신청이 완료되었습니다');
                this.reset();
            })
            .catch(error => {
                alert('신청 중 오류가 발생했습니다. 다시 시도해주세요.');
            });
        });
    </script>
</body>
</html>
